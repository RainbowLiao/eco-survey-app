<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>野外生態調查 App (V9)</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2e7d32">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { font-family: -apple-system, sans-serif; margin: 0; background-color: #f5f5f5; color: #333; padding-bottom: 70px; }
    .container { max-width: 600px; margin: 0 auto; background: white; min-height: 100vh; display: flex; flex-direction: column; position: relative;}
    header { background-color: #2e7d32; color: white; padding: 15px; text-align: center; font-weight: bold; position: sticky; top:0; z-index: 50;}
    .section { padding: 20px; }
    h1 { font-size: 24px; color: #1b5e20; text-align: center; margin-bottom: 5px;}
    h2 { font-size: 18px; color: #2e7d32; border-bottom: 2px solid #2e7d32; padding-bottom: 5px;}
    label { display: block; margin-top: 15px; font-weight: bold; color: #555; }
    input[type="text"], input[type="password"], input[type="checkbox"] { box-sizing: border-box; }
    input[type="text"], input[type="password"] { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
    
    .btn-primary { background-color: #2e7d32; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 18px; font-weight: bold; margin-top: 20px; cursor: pointer; }
    .btn-secondary { background-color: #f0f0f0; color: #333; border: 1px solid #ccc; padding: 10px; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; margin-top: 10px;}
    .btn-sync { background-color: #ff9800; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; margin-top: 20px; font-weight: bold;}
    
    #progress-container { width: 100%; background-color: #ffe0b2; border-radius: 8px; margin-top: 15px; overflow: hidden; display: none; height: 12px; }
    #progress-bar { width: 0%; height: 100%; background-color: #e65100; transition: width 0.3s ease; }
    
    #search-box { position: sticky; top: 52px; background: white; padding: 10px 20px; border-bottom: 1px solid #ddd; z-index: 10; }
    #autocomplete-list { list-style: none; padding: 0; margin: 0; max-height: 250px; overflow-y: auto; border: 1px solid #ddd; position: absolute; width: calc(100% - 40px); background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    #autocomplete-list li { padding: 15px; border-bottom: 1px solid #eee; font-size: 18px; cursor: pointer; }
    
    .record-item { padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: white;}
    .record-item:active { background-color: #e3f2fd; }
    .record-name { font-size: 18px; font-weight: bold; }
    .qty-display { font-size: 20px; font-weight: bold; background: #e8f5e9; padding: 5px 15px; border-radius: 20px; color: #2e7d32;}

    .staging-group { background: #fff; margin-bottom: 10px; border-bottom: 2px solid #2e7d32; padding-bottom: 10px;}
    .staging-header { background: #e8f5e9; padding: 10px 20px; font-weight: bold; color: #2e7d32; font-size: 14px;}
    .staging-item { padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; align-items: center; }
    .staging-checkbox { transform: scale(1.5); margin-right: 15px; }
    .staging-content { flex-grow: 1; cursor: pointer; }
    .staging-content:active { opacity: 0.7; }

    #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; display: none; justify-content: center; align-items: flex-end; }
    #modal-content { background: white; width: 100%; max-width: 600px; border-radius: 20px 20px 0 0; padding: 20px; box-sizing: border-box; max-height: 90vh; overflow-y: auto;}
    .modal-header { font-size: 22px; font-weight: bold; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 15px; display: flex; justify-content: space-between;}
    .close-btn { color: #888; cursor: pointer; font-size: 24px; }
    
    .qty-controls { display: flex; gap: 10px; margin-top: 10px; }
    .qty-btn { flex: 1; padding: 15px; font-size: 18px; background: #eee; border: none; border-radius: 8px; font-weight:bold; cursor:pointer;}
    .qty-input { flex: 2; text-align: center; font-size: 18px; border: 1px solid #ccc; border-radius: 8px; }
    
    #map-container { height: 250px; width: 100%; margin-top: 10px; border-radius: 8px; display: none; background: #e0e0e0;}
    
    .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: white; border-top: 1px solid #ddd; display: flex; box-shadow: 0 -2px 5px rgba(0,0,0,0.05); z-index: 80;}
    .nav-btn { flex: 1; padding: 15px 0; text-align: center; font-size: 16px; font-weight: bold; color: #777; cursor: pointer; background: none; border: none; }
    .nav-btn.active { color: #2e7d32; border-top: 3px solid #2e7d32; background: #f1f8e9;}
    .badge { background: red; color: white; border-radius: 50%; padding: 2px 6px; font-size: 12px; vertical-align: top; margin-left: 5px;}

    .map-search-wrapper { position: relative; width: 100%; display: flex; gap: 8px; margin-bottom: 15px;}
    #map-search-results { list-style: none; padding: 0; margin: 0; max-height: 220px; overflow-y: auto; border: 1px solid #ccc; position: absolute; width: 100%; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 1000; top: 50px; left: 0; border-radius: 8px;}
    #map-search-results li { padding: 12px 15px; border-bottom: 1px solid #eee; font-size: 16px; cursor: pointer; display: flex; flex-direction: column;}
    #map-search-results li:active { background-color: #e3f2fd; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="container">
  
  <div id="view-input">
    <div id="screen-metadata" class="section">
      <h1>生態調查即時資料處理系統</h1>
      <h2>📋 專案與樣站設定</h2>
      <label>調查案件</label><input type="text" id="meta-project" placeholder="例如：加走寮溪周邊生態調查案">
      <label>工區</label><input type="text" id="meta-area" placeholder="例如：工區一(可留白)">
      <label>調查地點</label><input type="text" id="meta-location" placeholder="例如：加走寮溪周邊(可留白)">
      <label>樣站(區)</label><input type="text" id="meta-station" placeholder="例如：水域樣站A(可留白)">
      
      <label style="color: #d32f2f;">🔐 系統授權碼 (連接雲端必填)</label>
      <input type="password" id="sys-auth" placeholder="請輸入公司授權碼" style="border-color: #d32f2f;">

      <button class="btn-sync" onclick="syncCatalog()" id="btn-sync">🔄 點此從雲端下載最新物種名錄</button>
      
      <div id="progress-container">
        <div id="progress-bar"></div>
      </div>
      
      <div id="catalog-status" style="text-align: center; font-size: 12px; color: #666; margin-top: 8px;">讀取中...</div>

      <div style="background: #e8f5e9; padding: 15px; border-radius: 8px; margin-top: 30px; border: 1px dashed #2e7d32;">
        <p style="margin: 0 0 10px 0; font-size: 14px; color: #2e7d32; font-weight: bold;">🏕️ 出發前準備：預載離線圖資</p>
        <button class="btn-secondary" style="margin-top: 0; border-color:#2e7d32; color:#2e7d32;" onclick="openPreloadMap()">🗺️ 打開地圖並搜尋樣區</button>
        <p style="margin: 8px 0 0 0; font-size: 12px; color: #666;">請在有網路時打開此功能，移動並放大調查區域，看過的畫面將會永久儲存供離線使用。</p>
        <button class="btn-secondary" style="margin-top: 15px; border-color:#d32f2f; color:#d32f2f; background-color: #ffebee;" onclick="clearMapCache()">🗑️ 清除已下載的離線地圖 (釋放手機空間)</button>
      </div>

      <button class="btn-primary" onclick="startSurvey()" style="margin-top: 30px;">開始記錄物種</button>
    </div>

    <div id="screen-main" class="hidden">
      <header id="header-meta">專案載入中...</header>
      <div id="search-box">
        <input type="text" id="search-input" placeholder="🔍 搜尋物種 (例: 斯氏)..." oninput="handleSearch()">
        <ul id="autocomplete-list" class="hidden"></ul>
      </div>
      <div id="current-record-list"></div>
      <div class="section">
        <button class="btn-secondary" onclick="resetStation()">🔙 結束此樣站，回上一頁</button>
      </div>
    </div>
  </div>

  <div id="view-staging" class="hidden" style="background: #f5f5f5; min-height: 100vh;">
    <header style="background: #1565c0;">📦 待上傳暫存區</header>
    <div class="section" style="padding-bottom: 0;">
      <p style="color: #666; font-size: 14px; margin-top: 0;">只要在這裡的資料，即使關閉網頁、重開機都不會消失。點擊物種名稱可進行修改。</p>
      <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
        <button class="btn-secondary" style="width: 48%; margin-top:0;" onclick="toggleSelectAll(true)">全選</button>
        <button class="btn-secondary" style="width: 48%; margin-top:0;" onclick="toggleSelectAll(false)">全不選</button>
      </div>
    </div>
    <div id="staging-list"></div>
    <div class="section">
      <button class="btn-primary" id="btn-upload" style="background-color: #1565c0;" onclick="uploadSelected()">🚀 上傳選取的資料</button>
      <button class="btn-secondary" style="color: red; border-color: red;" onclick="deleteSelected()">🗑️ 刪除選取資料</button>
    </div>
  </div>

</div>

<div class="bottom-nav">
  <button class="nav-btn active" id="nav-input" onclick="switchView('input')">📝 調查輸入</button>
  <button class="nav-btn" id="nav-staging" onclick="switchView('staging')">📦 暫存區 <span id="staging-badge" class="badge hidden">0</span></button>
</div>

<div id="modal-overlay">
  <div id="modal-content">
    <div class="modal-header">
      <span id="modal-title">物種名稱</span>
      <span class="close-btn" onclick="closeModal()">✖</span>
    </div>

    <div id="preload-search-bar" class="hidden map-search-wrapper">
      <div style="flex-grow: 1; position: relative;">
        <input type="text" id="preload-search-input" placeholder="輸入地名 或 座標(如: 23.6,120.7)" style="margin: 0;" oninput="handleMapSearch()">
        <ul id="map-search-results" class="hidden"></ul>
      </div>
      <button class="btn-secondary" style="margin: 0; width: auto; padding: 0 15px; border-color: #888; color: #888;" onclick="clearMapSearch()">✖</button>
    </div>
    
    <label class="input-element">數量設定</label>
    <div class="qty-controls input-element">
      <button class="qty-btn" onclick="setQty('-')">- (不計數)</button>
      <input type="text" id="modal-qty" class="qty-input">
      <button class="qty-btn" onclick="changeQty(1)">+ 1</button>
    </div>

    <label class="input-element">備註 (細節)</label>
    <input type="text" id="modal-notes" class="input-element" placeholder="輸入特徵或備註...">

    <label class="input-element" style="border-top: 1px solid #eee; padding-top: 15px; margin-top: 15px;">📍 紀錄座標 (可自動抓取或展開地圖微調)</label>
    <button class="btn-secondary input-element" id="btn-open-map" onclick="openMap()">📍 展開 Google 衛星地圖</button>
    
    <div id="map-container"></div>
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
      <div id="coords-display" style="font-size:12px; color:#1565c0; font-weight:bold;">正在嘗試取得 GPS...</div>
      <button id="btn-clear-gps" class="hidden" style="background:none; border:none; color:red; cursor:pointer;" onclick="clearMapCoords()">🗑️ 清空座標</button>
    </div>

    <button class="btn-primary" id="btn-save-modal" onclick="saveToStaging()">💾 存入暫存區</button>
  </div>
</div>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(err => console.log('SW failed', err));
  }

  // 您專屬的 GAS 網址 (V10)
  const GAS_URL = "https://script.google.com/macros/s/AKfycbxzY6rdvwOUlhcpdJ0J_lD6_afUgC2ru66on42Ny6UvPTd9Z9Mo6iZ0nNSjJwHAA00rrw/exec";
  proj4.defs("EPSG:3826", "+proj=tmerc +lat_0=0 +lon_0=121 +k=0.9999 +x_0=250000 +y_0=0 +ellps=GRS80 +towgs84=0,0,0,0,0,0,0 +units=m +no_defs");

  let speciesCatalog = JSON.parse(localStorage.getItem("speciesCatalog")) || [];
  let pendingRecords = JSON.parse(localStorage.getItem("pendingRecords")) || [];
  let surveyMetadata = {};
  let currentSessionRecords = []; 
  
  let editingSpecies = null; 
  let editingRecordId = null; // V10 新增：追蹤目前正在編輯的 ID
  
  let map, marker;
  let tempLat = null, tempLng = null;
  let mapSearchTimeout = null;

  window.onload = function() {
    updateCatalogStatus();
    updateStagingBadge();
    const savedAuth = localStorage.getItem("sysAuthCode");
    if(savedAuth) document.getElementById("sys-auth").value = savedAuth;
  }

  function updateCatalogStatus() {
    if(speciesCatalog.length > 0) {
      document.getElementById("catalog-status").innerText = `已載入 ${speciesCatalog.length} 筆離線名錄`;
    } else {
      document.getElementById("catalog-status").innerText = `⚠️ 尚未下載名錄！`;
    }
  }

  function clearMapCache() {
    if(confirm("確定要清除所有預載的離線地圖嗎？這將釋放手機空間，但斷網時將無法查看地圖。")) {
      if ('caches' in window) {
        caches.delete('eco-map-tiles').then(function(success) {
          if(success) alert("✅ 離線地圖快取已成功清除！空間已釋放。");
          else alert("目前沒有佔用空間的離線地圖。");
        });
      }
    }
  }

  function syncCatalog() {
    const authCode = document.getElementById("sys-auth").value.trim();
    if(!authCode) return alert("請先輸入系統授權碼！");
    localStorage.setItem("sysAuthCode", authCode); 

    const btn = document.getElementById("btn-sync");
    const progressContainer = document.getElementById("progress-container");
    const progressBar = document.getElementById("progress-bar");
    const statusText = document.getElementById("catalog-status");

    btn.innerText = "⏳ 驗證並下載名錄中...";
    btn.disabled = true;
    progressContainer.style.display = "block";
    progressBar.style.width = "0%";
    statusText.innerText = "正在連線伺服器...";

    let progress = 0;
    let simInterval = setInterval(() => {
      progress += Math.random() * 15;
      if (progress > 90) progress = 90;
      progressBar.style.width = progress + "%";
    }, 200);

    fetch(GAS_URL, {
      method: 'POST',
      redirect: 'follow',
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ action: "download", auth: authCode })
    })
    .then(response => response.json())
    .then(data => {
      clearInterval(simInterval);
      progressBar.style.width = "100%";
      statusText.innerText = "處理資料中...";

      setTimeout(() => {
        if (data.status === "error" || data.error) {
          alert("❌ " + (data.error || "未知錯誤"));
        } else {
          speciesCatalog = data.catalog;
          localStorage.setItem("speciesCatalog", JSON.stringify(data.catalog));
          statusText.innerText = `已載入 ${data.catalog.length} 筆離線名錄`;
          alert(`✅ 雲端名錄更新成功！共載入 ${data.catalog.length} 筆物種。`);
        }
        
        btn.innerText = "🔄 點此從雲端下載最新物種名錄";
        btn.disabled = false;
        progressContainer.style.display = "none";
        progressBar.style.width = "0%";
      }, 400); 
    })
    .catch(error => {
      clearInterval(simInterval);
      alert("❌ 下載失敗，請檢查網路連線。");
      btn.innerText = "🔄 點此從雲端下載最新物種名錄";
      btn.disabled = false;
      progressContainer.style.display = "none";
      progressBar.style.width = "0%";
    });
  }

  function switchView(viewName) {
    document.getElementById("view-input").classList.add("hidden");
    document.getElementById("view-staging").classList.add("hidden");
    document.getElementById("nav-input").classList.remove("active");
    document.getElementById("nav-staging").classList.remove("active");

    document.getElementById(`view-${viewName}`).classList.remove("hidden");
    document.getElementById(`nav-${viewName}`).classList.add("active");

    if (viewName === 'staging') renderStaging();
  }

  function startSurvey() {
    if(speciesCatalog.length === 0) return alert("請先輸入授權碼並下載名錄！");
    surveyMetadata = {
      project: document.getElementById("meta-project").value,
      area: document.getElementById("meta-area").value,
      location: document.getElementById("meta-location").value,
      station: document.getElementById("meta-station").value,
      surveyTime: new Date().toLocaleString('zh-TW', { hour12: false })
    };
    
    let displayMeta = `${surveyMetadata.location || '未填寫地點'}`;
    if (surveyMetadata.station) displayMeta += ` - ${surveyMetadata.station}`;
    document.getElementById("header-meta").innerText = displayMeta;
    
    document.getElementById("screen-metadata").classList.add("hidden");
    document.getElementById("screen-main").classList.remove("hidden");
    currentSessionRecords = [];
    renderCurrentSession();
  }

  function resetStation() {
    document.getElementById("screen-main").classList.add("hidden");
    document.getElementById("screen-metadata").classList.remove("hidden");
  }

  function handleSearch() {
    const keyword = document.getElementById("search-input").value.trim();
    const listEl = document.getElementById("autocomplete-list");
    listEl.innerHTML = "";
    if (keyword.length === 0) { listEl.classList.add("hidden"); return; }

    const matches = speciesCatalog.filter(s => s.name.includes(keyword));
    if (matches.length > 0) {
      matches.forEach(match => {
        const li = document.createElement("li");
        li.innerHTML = `<span>${match.name}</span> <span style="font-size:12px;color:#888;">${match.group}</span>`;
        li.onclick = () => openModal(match);
        listEl.appendChild(li);
      });
      listEl.classList.remove("hidden");
    } else { listEl.classList.add("hidden"); }
  }

  // === V9：新增紀錄模式 ===
  function openModal(species) {
    editingRecordId = null; // 確保是「新增」模式
    editingSpecies = species;
    
    document.getElementById("search-input").value = "";
    document.getElementById("autocomplete-list").classList.add("hidden");
    
    document.getElementById("modal-title").innerText = species.name;
    document.querySelectorAll(".input-element").forEach(el => el.style.display = "");
    document.getElementById("preload-search-bar").classList.add("hidden");
    
    document.getElementById("modal-qty").value = "1";
    document.getElementById("modal-notes").value = "";
    document.getElementById("map-container").style.display = "none";
    document.getElementById("map-container").style.height = "250px";
    
    const saveBtn = document.getElementById("btn-save-modal");
    saveBtn.innerText = "💾 存入暫存區";
    saveBtn.onclick = saveToStaging;

    tempLat = null; tempLng = null;
    updateGpsUI("正在嘗試取得 GPS...");

    // 新增時自動嘗試背景抓取
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        (pos) => { tempLat = pos.coords.latitude; tempLng = pos.coords.longitude; updateGpsUI(); },
        (err) => { updateGpsUI("無法自動取得GPS (可手動開啟地圖標記)"); },
        { enableHighAccuracy: true, timeout: 4000 }
      );
    }
    
    document.getElementById("modal-overlay").style.display = "flex";
  }

  // === V9：編輯舊紀錄模式 ===
  function editRecord(id) {
    const item = pendingRecords.find(r => r.id === id);
    if (!item) return;

    editingRecordId = id; // 設定為「編輯」模式
    // 假造一個 species 物件以防存檔時用到
    editingSpecies = { group: item.record.group, name: item.record.name }; 

    document.querySelectorAll(".input-element").forEach(el => el.style.display = "");
    document.getElementById("preload-search-bar").classList.add("hidden");
    
    // 填入既有資料
    document.getElementById("modal-title").innerText = item.record.name + " (編輯模式)";
    document.getElementById("modal-qty").value = item.record.quantity;
    document.getElementById("modal-notes").value = item.record.notes || "";
    
    document.getElementById("map-container").style.display = "none";
    document.getElementById("map-container").style.height = "250px";

    const saveBtn = document.getElementById("btn-save-modal");
    saveBtn.innerText = "💾 更新紀錄";
    saveBtn.onclick = saveToStaging;

    // 載入既有座標
    tempLat = item.record.wgs84_y ? parseFloat(item.record.wgs84_y) : null;
    tempLng = item.record.wgs84_x ? parseFloat(item.record.wgs84_x) : null;
    
    if (tempLat && tempLng) {
      updateGpsUI();
    } else {
      updateGpsUI("此紀錄尚未定位，可點擊展開地圖抓取");
    }

    document.getElementById("modal-overlay").style.display = "flex";
  }

  function closeModal() { document.getElementById("modal-overlay").style.display = "none"; }
  function setQty(val) { document.getElementById("modal-qty").value = val; }
  function changeQty(delta) {
    let current = document.getElementById("modal-qty").value;
    if (current === '-') current = 0;
    document.getElementById("modal-qty").value = Math.max(1, (parseInt(current) || 0) + delta);
  }

  function updateGpsUI(msg) {
    const display = document.getElementById("coords-display");
    if (msg) {
      display.innerText = msg; display.style.color = "#888";
      document.getElementById("btn-clear-gps").classList.add("hidden");
    } else if (tempLat && tempLng) {
      display.innerText = `已鎖定: ${tempLng.toFixed(5)}, ${tempLat.toFixed(5)}`;
      display.style.color = "#1565c0";
      document.getElementById("btn-clear-gps").classList.remove("hidden");
    }
  }

  function openMap() {
    document.getElementById("btn-open-map").style.display = "none";
    document.getElementById("map-container").style.display = "block";
    
    if (tempLat && tempLng) {
      showMap(tempLat, tempLng);
    } else if (navigator.geolocation) {
      document.getElementById("coords-display").innerText = "GPS 定位中...";
      navigator.geolocation.getCurrentPosition(
        (pos) => { showMap(pos.coords.latitude, pos.coords.longitude); },
        (err) => { alert("無 GPS 訊號！請直接拖動地圖。"); showMap(23.6978, 120.9605); },
        { enableHighAccuracy: true, timeout: 5000 }
      );
    } else { showMap(23.6978, 120.9605); }
  }

  function showMap(lat, lng) {
    tempLat = lat; tempLng = lng;
    updateGpsUI();
    if (!map) {
      map = L.map('map-container').setView([lat, lng], 16);
      L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 20 }).addTo(map);
      marker = L.marker([lat, lng], {draggable: true}).addTo(map);
      marker.on('dragend', function(e){
        tempLat = e.target.getLatLng().lat; tempLng = e.target.getLatLng().lng; updateGpsUI();
      });
    } else {
      map.setView([lat, lng], 16); marker.setLatLng([lat, lng]);
    }
    setTimeout(() => map.invalidateSize(), 300);
  }

  function clearMapCoords() {
    tempLat = null; tempLng = null;
    document.getElementById("map-container").style.display = "none";
    document.getElementById("btn-open-map").style.display = "block";
    updateGpsUI("座標已清空");
  }

  function openPreloadMap() {
    document.getElementById("modal-title").innerText = "🗺️ 離線地圖範圍預載";
    
    document.querySelectorAll(".input-element").forEach(el => el.style.display = "none");
    document.getElementById("preload-search-bar").classList.remove("hidden");
    document.getElementById("preload-search-input").value = "";
    document.getElementById("map-search-results").classList.add("hidden");
    
    document.getElementById("map-container").style.display = "block";
    document.getElementById("map-container").style.height = "400px"; 
    document.getElementById("coords-display").innerText = "滑動地圖以暫存畫面...";
    document.getElementById("btn-clear-gps").classList.add("hidden");
    
    const saveBtn = document.getElementById("btn-save-modal");
    saveBtn.innerText = "✅ 瀏覽完畢，確認關閉";
    saveBtn.onclick = closeModal;

    document.getElementById("modal-overlay").style.display = "flex";

    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        (pos) => { showMap(pos.coords.latitude, pos.coords.longitude); },
        (err) => { showMap(23.6978, 120.9605); },
        { enableHighAccuracy: true, timeout: 5000 }
      );
    } else { showMap(23.6978, 120.9605); }
  }

  function clearMapSearch() {
    document.getElementById("preload-search-input").value = "";
    document.getElementById("map-search-results").classList.add("hidden");
  }

  function handleMapSearch() {
    const query = document.getElementById("preload-search-input").value.trim();
    const listEl = document.getElementById("map-search-results");

    if (!query) {
      listEl.innerHTML = "";
      listEl.classList.add("hidden");
      return;
    }

    if (query.match(/^(\d+(\.\d+)?)\s*,\s*(\d+(\.\d+)?)$/)) {
      listEl.innerHTML = `<li onclick="jumpToCoords('${query}')"><span style="color:#1565c0; font-weight:bold;">📍 跳轉至此座標</span><span style="font-size:14px; color:#666;">${query}</span></li>`;
      listEl.classList.remove("hidden");
      return;
    }

    listEl.innerHTML = `<li style="color:#888; text-align:center; display:block;">搜尋中...</li>`;
    listEl.classList.remove("hidden");

    clearTimeout(mapSearchTimeout);
    mapSearchTimeout = setTimeout(() => {
      fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query + " 台灣")}&limit=5`)
        .then(res => res.json())
        .then(data => {
          listEl.innerHTML = "";
          if (data && data.length > 0) {
            data.forEach(place => {
              const li = document.createElement("li");
              const nameParts = place.display_name.split(',');
              const mainName = nameParts[0];
              li.innerHTML = `<span style="font-weight:bold; color:#1565c0;">${mainName}</span><span style="font-size:12px; color:#888; margin-top:4px;">${place.display_name}</span>`;
              
              li.onclick = () => {
                document.getElementById("preload-search-input").value = mainName;
                listEl.classList.add("hidden");
                const lat = parseFloat(place.lat);
                const lng = parseFloat(place.lon);
                if (map) { map.setView([lat, lng], 16); if (marker) marker.setLatLng([lat, lng]); } 
                else showMap(lat, lng);
              };
              listEl.appendChild(li);
            });
          } else {
            listEl.innerHTML = `<li style="color:#d32f2f; text-align:center; display:block;">找不到相關地點</li>`;
          }
        }).catch(e => {
          listEl.innerHTML = `<li style="color:#d32f2f; text-align:center; display:block;">網路連線錯誤，無法搜尋</li>`;
        });
    }, 800);
  }

  function jumpToCoords(query) {
    const coordsMatch = query.match(/^(\d+(\.\d+)?)\s*,\s*(\d+(\.\d+)?)$/);
    if (coordsMatch) {
      const lat = parseFloat(coordsMatch[1]); const lng = parseFloat(coordsMatch[3]);
      if (map) { map.setView([lat, lng], 16); if (marker) marker.setLatLng([lat, lng]); } 
      else showMap(lat, lng);
      document.getElementById("map-search-results").classList.add("hidden");
      document.getElementById("preload-search-input").value = query;
    }
  }

  // === V9：更新寫入邏輯 (區分新增與編輯) ===
  function saveToStaging() {
    let wgs_x = "", wgs_y = "", twd_x = "", twd_y = "";
    if (tempLat && tempLng) {
      const twd97 = proj4("EPSG:4326", "EPSG:3826", [tempLng, tempLat]);
      wgs_x = tempLng.toFixed(6); wgs_y = tempLat.toFixed(6);
      twd_x = twd97[0].toFixed(2); twd_y = twd97[1].toFixed(2);
    }
    
    if (editingRecordId) {
      // 修改模式
      const index = pendingRecords.findIndex(r => r.id === editingRecordId);
      if (index !== -1) {
        pendingRecords[index].record.quantity = document.getElementById("modal-qty").value;
        pendingRecords[index].record.notes = document.getElementById("modal-notes").value;
        pendingRecords[index].record.wgs84_x = wgs_x;
        pendingRecords[index].record.wgs84_y = wgs_y;
        pendingRecords[index].record.twd97_x = twd_x;
        pendingRecords[index].record.twd97_y = twd_y;
      }
      
      // 同步更新當前樣站的顯示畫面
      const sessionIndex = currentSessionRecords.findIndex(r => r.id === editingRecordId);
      if (sessionIndex !== -1) {
        currentSessionRecords[sessionIndex].record.quantity = document.getElementById("modal-qty").value;
        currentSessionRecords[sessionIndex].record.notes = document.getElementById("modal-notes").value;
        currentSessionRecords[sessionIndex].record.wgs84_x = wgs_x;
        currentSessionRecords[sessionIndex].record.wgs84_y = wgs_y;
      }
      
    } else {
      // 新增模式
      const newRecord = {
        id: Date.now(), 
        metadata: JSON.parse(JSON.stringify(surveyMetadata)),
        record: { group: editingSpecies.group, name: editingSpecies.name, quantity: document.getElementById("modal-qty").value, notes: document.getElementById("modal-notes").value, wgs84_x: wgs_x, wgs84_y: wgs_y, twd97_x: twd_x, twd97_y: twd_y }
      };
      pendingRecords.push(newRecord); 
      currentSessionRecords.unshift(newRecord); // 改為存入整個物件以便後續編輯
    }

    localStorage.setItem("pendingRecords", JSON.stringify(pendingRecords));
    renderCurrentSession(); 
    updateStagingBadge(); 
    
    // 如果目前停留在暫存區，順便重繪暫存區
    if (!document.getElementById("view-staging").classList.contains("hidden")) {
      renderStaging();
    }
    closeModal();
  }

  // === V9：讓列表支援點擊編輯 ===
  function renderCurrentSession() {
    const listEl = document.getElementById("current-record-list");
    listEl.innerHTML = `<div style="padding:10px 20px; font-size:12px; color:#888; background:#f9f9f9;">本樣站剛加入的物種 (點擊可修改)</div>`;
    currentSessionRecords.forEach(item => {
      const r = item.record;
      listEl.innerHTML += `
        <div class="record-item" onclick="editRecord(${item.id})">
          <div>
            <div class="record-name">${r.name}</div>
            <div style="font-size:12px;color:#888;">
              ${r.notes ? '📝'+r.notes + ' ' : ''}
              <span style="${r.wgs84_x ? 'color:#1565c0; font-weight:bold;' : ''}">${r.wgs84_x ? '📍有座標' : '無座標'}</span>
            </div>
          </div>
          <div class="qty-display">${r.quantity}</div>
        </div>`;
    });
  }

  function updateStagingBadge() {
    const badge = document.getElementById("staging-badge"); badge.innerText = pendingRecords.length;
    if (pendingRecords.length > 0) badge.classList.remove("hidden"); else badge.classList.add("hidden");
  }

  function renderStaging() {
    const listEl = document.getElementById("staging-list"); listEl.innerHTML = "";
    if (pendingRecords.length === 0) { listEl.innerHTML = "<div style='text-align:center; padding: 40px; color:#888;'>暫存區沒有資料</div>"; return; }
    const groups = {};
    pendingRecords.forEach(item => {
      const key = `${item.metadata.location || '未填寫地點'} ${item.metadata.station ? '- ' + item.metadata.station : ''}`;
      if (!groups[key]) groups[key] = []; groups[key].push(item);
    });
    for (let key in groups) {
      let groupHtml = `<div class="staging-group"><div class="staging-header">${key}</div>`;
      groups[key].forEach(item => {
        const r = item.record;
        groupHtml += `
          <div class="staging-item">
            <input type="checkbox" class="staging-checkbox" value="${item.id}" checked>
            <div class="staging-content" onclick="editRecord(${item.id})">
              <div class="record-name" style="font-size:16px;">${r.name} <span style="font-size:14px; color:#2e7d32; font-weight:normal; margin-left:10px;">數量: ${r.quantity}</span></div>
              <div style="font-size:12px; color:#888; margin-top:4px;">${r.notes ? '📝'+r.notes + ' ' : ''} ${r.wgs84_x ? '📍有座標' : ''}</div>
            </div>
            <div style="padding-left: 10px; color: #1565c0; font-size: 14px;" onclick="editRecord(${item.id})">✏️</div>
          </div>`;
      });
      groupHtml += `</div>`; listEl.innerHTML += groupHtml;
    }
  }

  function toggleSelectAll(check) { document.querySelectorAll('.staging-checkbox').forEach(cb => cb.checked = check); }
  function deleteSelected() {
    const selectedIds = Array.from(document.querySelectorAll('.staging-checkbox:checked')).map(cb => parseInt(cb.value));
    if (selectedIds.length === 0) return alert("請先勾選要刪除的資料！");
    if (confirm(`確定要刪除選取的 ${selectedIds.length} 筆資料嗎？`)) {
      pendingRecords = pendingRecords.filter(item => !selectedIds.includes(item.id));
      localStorage.setItem("pendingRecords", JSON.stringify(pendingRecords)); renderStaging(); updateStagingBadge();
      
      // 同步移除目前輸入畫面的快照
      currentSessionRecords = currentSessionRecords.filter(item => !selectedIds.includes(item.id));
      renderCurrentSession();
    }
  }

  function uploadSelected() {
    const authCode = document.getElementById("sys-auth").value.trim();
    if(!authCode) {
      switchView('input');
      return alert("請先在首頁填寫系統授權碼！");
    }

    const selectedIds = Array.from(document.querySelectorAll('.staging-checkbox:checked')).map(cb => parseInt(cb.value));
    if (selectedIds.length === 0) return alert("請先勾選要上傳的資料！");
    const btn = document.getElementById("btn-upload"); btn.innerText = "📤 正在上傳中，請稍候..."; btn.disabled = true;

    const itemsToUpload = pendingRecords.filter(item => selectedIds.includes(item.id));
    const payloads = {}; 
    itemsToUpload.forEach(item => {
      const sig = `${item.metadata.project}_${item.metadata.area}_${item.metadata.location}_${item.metadata.station}`;
      if (!payloads[sig]) payloads[sig] = { action: "upload", auth: authCode, metadata: item.metadata, records: [] };
      payloads[sig].records.push(item.record);
    });

    let uploadPromises = Object.values(payloads).map(payload => {
      return fetch(GAS_URL, { method: "POST", redirect: "follow", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify(payload) }).then(r => r.json());
    });

    Promise.all(uploadPromises).then(results => {
      const authError = results.find(res => res.error || res.status === "error");
      if (authError) {
        alert("❌ " + (authError.message || authError.error));
        btn.innerText = "🚀 上傳選取的資料"; btn.disabled = false;
        return;
      }

      pendingRecords = pendingRecords.filter(item => !selectedIds.includes(item.id));
      localStorage.setItem("pendingRecords", JSON.stringify(pendingRecords));
      
      currentSessionRecords = currentSessionRecords.filter(item => !selectedIds.includes(item.id));
      
      alert("✅ 選取的資料已成功上傳至 Google Sheets！");
      renderStaging(); updateStagingBadge(); renderCurrentSession();
      btn.innerText = "🚀 上傳選取的資料"; btn.disabled = false;
    }).catch(e => {
      alert("❌ 上傳失敗，請確認網路有訊號後再試一次！"); btn.innerText = "🚀 上傳選取的資料"; btn.disabled = false;
    });
  }
</script>
